<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy Test</title>
<style>
body { font-family: monospace; padding: 20px; background: #111; color: #eee; }
button { padding: 12px 24px; font-size: 16px; margin: 8px 0; display: block; width: 100%; }
pre { background: #222; padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 12px; white-space: pre-wrap; }
.ok { color: #4cd080; }
.err { color: #f06060; }
</style>
</head>
<body>
<h2>🔧 Proxy Debug Test</h2>

<button onclick="test1()">1. Test Proxy Root</button>
<button onclick="test2()">2. Test Proxy + AAPL</button>
<button onclick="test3()">3. Test Parse Result</button>
<pre id="out">Click a button to test...</pre>

<script>
const PROXY = 'https://proxy-v408.onrender.com';
const log = (msg, ok) => {
  const el = document.getElementById('out');
  el.innerHTML += `<span class="${ok ? 'ok' : 'err'}">${msg}</span>\n`;
};

async function test1() {
  document.getElementById('out').innerHTML = '';
  log('Testing proxy root...', true);
  try {
    const r = await fetch(PROXY + '/');
    const d = await r.json();
    log('✅ Proxy root OK: ' + JSON.stringify(d), true);
  } catch(e) {
    log('❌ Proxy root FAILED: ' + e.message, false);
  }
}

async function test2() {
  document.getElementById('out').innerHTML = '';
  log('Testing proxy + AAPL...', true);
  try {
    const yahooUrl = 'https://query1.finance.yahoo.com/v8/finance/chart/AAPL?range=1mo&interval=1d';
    const url = PROXY + '/api/proxy?url=' + encodeURIComponent(yahooUrl);
    log('Calling: ' + url, true);
    const r = await fetch(url);
    log('Status: ' + r.status, r.ok);
    const text = await r.text();
    log('Response (first 300 chars):\n' + text.substring(0, 300), r.ok);
  } catch(e) {
    log('❌ FAILED: ' + e.message, false);
  }
}

async function test3() {
  document.getElementById('out').innerHTML = '';
  log('Testing full parse...', true);
  try {
    const yahooUrl = 'https://query1.finance.yahoo.com/v8/finance/chart/AAPL?range=1mo&interval=1d';
    const url = PROXY + '/api/proxy?url=' + encodeURIComponent(yahooUrl);
    const r = await fetch(url);
    const data = await r.json();
    log('Raw keys: ' + Object.keys(data), true);
    if (data.chart) {
      log('chart keys: ' + Object.keys(data.chart), true);
      if (data.chart.result) {
        log('result length: ' + data.chart.result.length, true);
        const result = data.chart.result[0];
        const closes = result.indicators.quote[0].close.filter(c => c != null);
        const price = closes[closes.length-1];
        log('✅ SUCCESS! AAPL price: $' + price.toFixed(2), true);
        log('Data points: ' + closes.length, true);
      } else {
        log('❌ No result array. Error: ' + JSON.stringify(data.chart.error), false);
      }
    } else {
      log('❌ No chart key. Full response:\n' + JSON.stringify(data).substring(0, 500), false);
    }
  } catch(e) {
    log('❌ Parse FAILED: ' + e.message + '\n' + e.stack, false);
  }
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCA Score 趨勢圖 — 真實資料測試</title>
<style>
:root{
  --font-sans:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',Arial,sans-serif;
  --bg:#fbfbfd;--bg2:#f5f5f7;--surface:#fff;--border:#e6e6ea;
  --ink:#1d1d1f;--ink2:#6e6e73;--ink3:#9a9a9f;
  --accent:#c8813a;--al:#faf3e8;
  --price-line:#3a3a3c;
}
*{box-sizing:border-box;}
body{background:var(--bg);color:var(--ink);font-family:var(--font-sans);margin:0;padding:16px 14px 50px;font-size:14px;letter-spacing:-.1px;}
h1{font-size:16px;font-weight:650;margin:0 0 12px;}
.row{display:flex;gap:8px;margin-bottom:12px;}
input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:16px;text-transform:uppercase;}
button{padding:10px 18px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-weight:600;font-size:15px;}
button:disabled{background:#c7c7cc;}
.status{font-size:12px;color:var(--ink2);margin-bottom:12px;min-height:16px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:18px 16px;margin-bottom:16px;box-shadow:0 1px 8px rgba(0,0,0,.04);}
.card-title{font-size:15px;font-weight:650;margin-bottom:4px;}
.card-sub{font-size:11.5px;color:var(--ink2);margin-bottom:12px;line-height:1.5;}
.pfcf-note{display:inline-flex;font-size:10px;color:var(--ink3);background:var(--bg2);border-radius:12px;padding:4px 10px;margin-bottom:10px;}
.legend-row{display:flex;gap:14px;margin-bottom:8px;font-size:11px;color:var(--ink2);}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-dot{width:10px;height:3px;border-radius:2px;}
.axis-label{font-size:9px;color:var(--ink3);}
.disclaimer{font-size:10px;color:var(--ink3);background:var(--bg2);border-radius:10px;padding:8px 10px;margin-top:8px;line-height:1.5;}
.bucket-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.bucket-label{width:58px;font-size:11.5px;color:var(--ink2);flex-shrink:0;font-variant-numeric:tabular-nums;}
.bucket-bar-wrap{flex:1;background:var(--bg2);border-radius:6px;height:20px;position:relative;overflow:hidden;}
.bucket-bar{height:100%;border-radius:6px;}
.bucket-val{width:54px;text-align:left;font-size:11.5px;font-weight:650;color:var(--ink);flex-shrink:0;}
.bucket-n{width:48px;text-align:right;font-size:10px;color:var(--ink3);flex-shrink:0;}
.section-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:6px;}
.err{color:#b83232;background:#fde8e8;padding:10px 12px;border-radius:10px;margin-bottom:14px;font-size:12.5px;}
</style>
</head>
<body>

<h1>📈 DCA Score 趨勢圖 — 真實資料測試</h1>

<div class="row">
  <input id="tickerInput" placeholder="AAPL" value="AAPL" autocapitalize="characters" autocomplete="off">
  <button id="queryBtn" onclick="runQuery()">查詢</button>
</div>
<div class="status" id="statusLine"></div>
<div id="errBox"></div>
<div id="content"></div>

<script>
const API = 'https://proxy-three-mu-47.vercel.app/api/historical-score';

async function runQuery() {
  const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
  if (!ticker) return;
  const btn = document.getElementById('queryBtn');
  const statusLine = document.getElementById('statusLine');
  const errBox = document.getElementById('errBox');
  const content = document.getElementById('content');

  btn.disabled = true;
  errBox.innerHTML = '';
  content.innerHTML = '';
  statusLine.textContent = '查詢中…(第一次查詢要現算最多520週,可能要等10幾秒到更久)';

  const startTime = Date.now();
  try {
    const res = await fetch(`${API}?ticker=${encodeURIComponent(ticker)}`);
    const data = await res.json();
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

    if (!res.ok) {
      errBox.innerHTML = `<div class="err">錯誤:${data.error || res.status}</div>`;
      statusLine.textContent = '';
      btn.disabled = false;
      return;
    }

    statusLine.textContent = `完成,花了 ${elapsed} 秒 · ${data.weeks}筆(快取${data.fromCache}/新算${data.newlyComputed})`;
    renderAll(ticker, data.series);
  } catch (e) {
    errBox.innerHTML = `<div class="err">連線失敗:${e.message}</div>`;
    statusLine.textContent = '';
  }
  btn.disabled = false;
}

function renderAll(ticker, series) {
  const content = document.getElementById('content');
  const hasPfcfAny = series.some(r => r.hasPfcf);
  const hasPfcfAll = series.every(r => r.hasPfcf);
  const pfcfNote = hasPfcfAll ? '✓ 全部含 P/FCF 估值面'
    : hasPfcfAny ? `含 P/FCF(${series.filter(r=>r.hasPfcf).length}/${series.length}週,年度資料限制)`
    : '不含 P/FCF(此資產無估值面資料,全程走4指標公式)';

  content.innerHTML = `
    <div class="card">
      <div class="card-title">${ticker} · DCA Score 趨勢圖</div>
      <div class="card-sub">實際回溯期間依資產可用資料而定,最長10年 · 每週一個資料點(共${series.length}筆) · 以現行公式回溯計算</div>
      <div class="pfcf-note">${pfcfNote}</div>
      <div class="legend-row">
        <div class="legend-item"><span class="legend-dot" style="background:var(--accent);"></span>DCA Score(4週平均,左軸)</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--price-line);"></span>價格(右軸,對數)</div>
      </div>
      <svg id="realChart" width="100%" height="220" viewBox="0 0 340 220" preserveAspectRatio="none"></svg>
      <div id="xAxisLabels" style="display:flex;justify-content:space-between;margin-top:4px;"></div>
      <div class="disclaimer">⚠️ 本圖以現行 DCA Score 公式回溯歷史資料計算,並非當時使用者實際看到的分數(公式持續演化中)。百分位算法結構上會在 0–100 間週期擺動,不代表發現市場規律,僅供參考,非投資建議。</div>
    </div>

    <div class="card">
      <div class="section-label">統計驗證 · 核心</div>
      <div class="card-title">60分門檻 vs 價格相對位置</div>
      <div class="card-sub">驗證「分數≥60(加碼門檻)」是否真的對應相對低價位置——不是預測未來,是檢查訊號本身合不合邏輯</div>
      <div id="thresholdStats"></div>
    </div>

    <div class="card">
      <div class="section-label">統計驗證 · 輔助</div>
      <div class="card-title">分數區間 → 未來3個月平均報酬</div>
      <div class="card-sub">把每一週依當週DCA Score分組,比較各組往後約13週(3個月)的平均報酬率(真實計算,非假資料)</div>
      <div id="bucketChart"></div>
      <div class="disclaimer">分數與報酬的差距越明顯,代表分數越有預測力。此為歷史統計,不代表未來表現,非投資建議。</div>
    </div>
  `;

  drawRealChart(series);
  renderThresholdStats(series);
  renderBucketStats(series);
}

// ── 60分門檻 vs 價格相對位置(真實計算)──
// 邏輯:對每一週,算出「價格落在過去52週(約1年)高低區間的相對位置」(0=年度低點,1=年度高點),
// 再比較「分數>=60的週」跟「分數<60的週」,這個相對位置平均值差多少——差距越大,代表
// 60分門檻越能真正對應到相對低價位置,不是隨機觸發。這是驗證訊號本身合不合邏輯,
// 不是在預測未來走勢。
function computeRelPositions(series) {
  const WINDOW = 52;
  return series.map((r, i) => {
    const start = Math.max(0, i - WINDOW + 1);
    const windowPrices = series.slice(start, i + 1).map(x => x.price);
    const high = Math.max(...windowPrices), low = Math.min(...windowPrices);
    const relPos = high === low ? 0.5 : (r.price - low) / (high - low);
    return { ...r, relPos };
  });
}

function renderThresholdStats(series) {
  const withPos = computeRelPositions(series);
  const triggered = withPos.filter(r => r.score >= 60);
  const notTriggered = withPos.filter(r => r.score < 60);

  const avg = (arr) => arr.length ? arr.reduce((a,r)=>a+r.relPos,0)/arr.length : null;
  const avgTriggered = avg(triggered);
  const avgNot = avg(notTriggered);
  const pct = (triggered.length / withPos.length * 100).toFixed(1);

  // 分年度統計
  const byYear = {};
  withPos.forEach(r => {
    const y = r.week.slice(0,4);
    if (!byYear[y]) byYear[y] = { total: 0, triggered: 0, prices: [] };
    byYear[y].total++;
    byYear[y].prices.push(r.price);
    if (r.score >= 60) byYear[y].triggered++;
  });

  const yearRows = Object.keys(byYear).sort().map(y => {
    const d = byYear[y];
    const yPct = (d.triggered / d.total * 100).toFixed(0);
    return `
      <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bg2);font-size:11.5px;">
        <div style="width:38px;color:var(--ink2);">${y}</div>
        <div style="flex:1;background:var(--bg2);border-radius:5px;height:14px;overflow:hidden;">
          <div style="width:${yPct}%;height:100%;background:var(--accent);"></div>
        </div>
        <div style="width:52px;text-align:right;color:var(--ink2);">${d.triggered}/${d.total}週</div>
        <div style="width:36px;text-align:right;font-weight:650;">${yPct}%</div>
      </div>
    `;
  }).join('');

  document.getElementById('thresholdStats').innerHTML = `
    <div class="summary-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">
      <div style="background:var(--bg2);border-radius:10px;padding:10px 12px;">
        <div style="font-size:10px;color:var(--ink3);margin-bottom:2px;">觸發週數(≥60分)</div>
        <div style="font-size:17px;font-weight:650;">${triggered.length} / ${withPos.length} <span style="font-size:12px;color:var(--ink2);">(${pct}%)</span></div>
      </div>
      <div style="background:var(--bg2);border-radius:10px;padding:10px 12px;">
        <div style="font-size:10px;color:var(--ink3);margin-bottom:2px;">相對位置差距</div>
        <div style="font-size:17px;font-weight:650;">${avgTriggered.toFixed(2)} <span style="color:var(--ink3);font-size:12px;">vs</span> ${avgNot.toFixed(2)}</div>
      </div>
    </div>
    <div style="font-size:11px;color:var(--ink2);margin-bottom:8px;">0=近1年低點,1=近1年高點 · 觸發週平均位置越接近0,代表訊號越準</div>
    <div style="font-size:11px;font-weight:650;color:var(--ink2);margin-bottom:4px;">年度觸發比例</div>
    ${yearRows}
  `;
}

// ── SVG雙線疊線圖(左軸Score 0-100,右軸價格對數尺度) ──
// 分數線加4週移動平均做平滑(原始週資料太毛躁,不好讀),原始資料改用淡色細線放背景參考。
function movingAverage(arr, window) {
  return arr.map((_, i) => {
    const start = Math.max(0, i - window + 1);
    const slice = arr.slice(start, i + 1);
    return slice.reduce((a,b)=>a+b,0) / slice.length;
  });
}

function drawRealChart(series) {
  const svg = document.getElementById('realChart');
  const N = series.length;
  const W = 340, H = 220, padL=6, padR=6, padT=10, padB=10;
  const chartW = W - padL - padR, chartH = H - padT - padB;

  const scores = series.map(r => r.score);
  const scoresSmooth = movingAverage(scores, 4);
  const prices = series.map(r => r.price);
  const priceMin = Math.min(...prices), priceMax = Math.max(...prices);

  const gx = i => padL + (i/(N-1))*chartW;
  const gyScore = s => padT + (1 - s/100) * chartH;
  const gyPrice = p => padT + (1 - (Math.log(p)-Math.log(priceMin))/(Math.log(priceMax)-Math.log(priceMin))) * chartH;

  let scoreRawPath = '', scoreSmoothPath = '', pricePath = '';
  for(let i=0;i<N;i++){
    const cmd = i===0?'M':'L';
    scoreRawPath += `${cmd}${gx(i).toFixed(1)},${gyScore(scores[i]).toFixed(1)} `;
    scoreSmoothPath += `${cmd}${gx(i).toFixed(1)},${gyScore(scoresSmooth[i]).toFixed(1)} `;
    pricePath += `${cmd}${gx(i).toFixed(1)},${gyPrice(prices[i]).toFixed(1)} `;
  }
  const y60 = gyScore(60);

  svg.innerHTML = `
    <line x1="${padL}" y1="${y60.toFixed(1)}" x2="${W-padR}" y2="${y60.toFixed(1)}" stroke="#e6e6ea" stroke-width="1" stroke-dasharray="3,3"/>
    <path d="${pricePath}" fill="none" stroke="var(--price-line)" stroke-width="1.3" opacity="0.5"/>
    <path d="${scoreRawPath}" fill="none" stroke="var(--accent)" stroke-width="0.8" opacity="0.28"/>
    <path d="${scoreSmoothPath}" fill="none" stroke="var(--accent)" stroke-width="2.2"/>
  `;

  const labels = document.getElementById('xAxisLabels');
  const first = series[0].week, mid = series[Math.floor(N/2)].week, last = series[N-1].week;
  labels.innerHTML = `<span class="axis-label">${first}</span><span class="axis-label">${mid}</span><span class="axis-label">${last}</span>`;
}

// ── 分數分組看未來報酬(真實計算) ──
function renderBucketStats(series) {
  const FORWARD_WEEKS = 13; // 約3個月
  const buckets = [
    { label:'< 40分', min:-Infinity, max:40, color:'#c7c7cc' },
    { label:'40–60分', min:40, max:60, color:'#e0b088' },
    { label:'60–70分', min:60, max:70, color:'#d99a5c' },
    { label:'≥ 70分', min:70, max:Infinity, color:'var(--accent)' },
  ];

  buckets.forEach(b => { b.returns = []; });

  for (let i = 0; i < series.length - FORWARD_WEEKS; i++) {
    const s = series[i].score;
    const p0 = series[i].price;
    const p1 = series[i + FORWARD_WEEKS].price;
    const fwdReturn = (p1 - p0) / p0 * 100;
    const bucket = buckets.find(b => s >= b.min && s < b.max);
    if (bucket) bucket.returns.push(fwdReturn);
  }

  buckets.forEach(b => {
    b.avg = b.returns.length ? b.returns.reduce((a,c)=>a+c,0) / b.returns.length : null;
  });

  const validAvgs = buckets.filter(b => b.avg !== null).map(b => b.avg);
  const maxAbs = Math.max(...validAvgs.map(v => Math.abs(v)), 1);

  document.getElementById('bucketChart').innerHTML = buckets.map(b => {
    if (b.avg === null) {
      return `<div class="bucket-row"><div class="bucket-label">${b.label}</div><div style="font-size:11px;color:var(--ink3);">樣本不足</div></div>`;
    }
    const widthPct = Math.max(3, Math.abs(b.avg) / maxAbs * 100);
    const sign = b.avg >= 0 ? '+' : '';
    return `
      <div class="bucket-row">
        <div class="bucket-label">${b.label}</div>
        <div class="bucket-bar-wrap">
          <div class="bucket-bar" style="width:${widthPct.toFixed(0)}%;background:${b.color};"></div>
        </div>
        <div class="bucket-val">${sign}${b.avg.toFixed(1)}%</div>
        <div class="bucket-n">n=${b.returns.length}週</div>
      </div>
    `;
  }).join('');
}

// 頁面載入自動查一次AAPL
runQuery();
</script>

</body>
</html>

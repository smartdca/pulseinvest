<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug — Historical Score</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;margin:0;padding:16px;background:#fbfbfd;color:#1d1d1f;font-size:14px;}
  h1{font-size:17px;margin:0 0 14px;}
  .row{display:flex;gap:8px;margin-bottom:14px;}
  input{flex:1;padding:10px 12px;border:1px solid #e6e6ea;border-radius:10px;font-size:16px;text-transform:uppercase;}
  button{padding:10px 18px;border:none;border-radius:10px;background:#c8813a;color:#fff;font-weight:600;font-size:15px;}
  button:disabled{background:#c7c7cc;}
  .status{font-size:12.5px;color:#6e6e73;margin-bottom:14px;min-height:18px;}
  .summary{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
  .sbox{background:#fff;border:1px solid #e6e6ea;border-radius:10px;padding:10px 12px;}
  .sbox .lbl{font-size:10.5px;color:#9a9a9f;margin-bottom:3px;}
  .sbox .val{font-size:16px;font-weight:650;}
  table{width:100%;border-collapse:collapse;font-size:12.5px;background:#fff;border-radius:10px;overflow:hidden;table-layout:fixed;}
  th,td{padding:7px 4px;text-align:right;border-bottom:1px solid #f0f0f2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  th:first-child,td:first-child{text-align:left;width:30%;}
  th:last-child,td:last-child{width:14%;}
  th{background:#f5f5f7;color:#6e6e73;font-weight:600;position:sticky;top:0;font-size:10.5px;}
  .tbl-wrap{max-height:70vh;overflow:auto;border:1px solid #e6e6ea;border-radius:10px;}
  .err{color:#b83232;background:#fde8e8;padding:10px 12px;border-radius:10px;margin-bottom:14px;}
  .flag-yes{color:#2e7d32;}
  .flag-no{color:#c7c7cc;}
</style>
</head>
<body>

<h1>🔧 Debug: Historical Score</h1>

<div class="row">
  <input id="tickerInput" placeholder="AAPL" value="AAPL" autocapitalize="characters" autocomplete="off">
  <button id="queryBtn" onclick="runQuery()">查詢</button>
</div>
<div class="status" id="statusLine"></div>

<div id="errBox"></div>
<div id="summaryBox"></div>
<div class="tbl-wrap" id="tableWrap"></div>
<div style="font-size:10.5px;color:#9a9a9f;margin-top:6px;">M=有200週MA資料 · P=有P/FCF資料 · 淺灰點=無資料(自動退回較少指標公式)</div>

<script>
const API = 'https://proxy-three-mu-47.vercel.app/api/historical-score';

async function runQuery() {
  const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
  if (!ticker) return;
  const btn = document.getElementById('queryBtn');
  const statusLine = document.getElementById('statusLine');
  const errBox = document.getElementById('errBox');
  const summaryBox = document.getElementById('summaryBox');
  const tableWrap = document.getElementById('tableWrap');

  btn.disabled = true;
  errBox.innerHTML = '';
  summaryBox.innerHTML = '';
  tableWrap.innerHTML = '';
  statusLine.textContent = '查詢中…(第一次查詢要現算260週資料,可能要等10幾秒)';

  const startTime = Date.now();
  try {
    const res = await fetch(`${API}?ticker=${encodeURIComponent(ticker)}`);
    const data = await res.json();
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

    if (!res.ok) {
      errBox.innerHTML = `<div class="err">錯誤:${data.error || res.status}</div>`;
      statusLine.textContent = '';
      btn.disabled = false;
      return;
    }

    statusLine.textContent = `完成,花了 ${elapsed} 秒`;
    renderSummary(data);
    renderTable(data.series);
  } catch (e) {
    errBox.innerHTML = `<div class="err">連線失敗:${e.message}</div>`;
    statusLine.textContent = '';
  }
  btn.disabled = false;
}

function renderSummary(data) {
  const scores = data.series.map(r => r.score);
  const avg = (scores.reduce((a,b)=>a+b,0) / scores.length).toFixed(1);
  const maxRow = data.series.reduce((a,b) => b.score > a.score ? b : a);
  const minRow = data.series.reduce((a,b) => b.score < a.score ? b : a);
  const pfcfCount = data.series.filter(r => r.hasPfcf).length;
  const maCount = data.series.filter(r => r.hasMa).length;

  document.getElementById('summaryBox').innerHTML = `
    <div class="summary">
      <div class="sbox"><div class="lbl">資產類型</div><div class="val">${data.instrumentType || '—'}</div></div>
      <div class="sbox"><div class="lbl">總筆數</div><div class="val">${data.weeks}</div></div>
      <div class="sbox"><div class="lbl">分數平均值</div><div class="val">${avg}</div></div>
      <div class="sbox"><div class="lbl">快取/新算</div><div class="val">${data.fromCache} / ${data.newlyComputed}</div></div>
      <div class="sbox"><div class="lbl">最高分</div><div class="val">${maxRow.score} <span style="font-size:11px;color:#9a9a9f;">(${maxRow.week})</span></div></div>
      <div class="sbox"><div class="lbl">最低分</div><div class="val">${minRow.score} <span style="font-size:11px;color:#9a9a9f;">(${minRow.week})</span></div></div>
      <div class="sbox"><div class="lbl">有200週MA的週數</div><div class="val">${maCount} / ${data.weeks}</div></div>
      <div class="sbox"><div class="lbl">有P/FCF的週數</div><div class="val">${pfcfCount} / ${data.weeks}</div></div>
    </div>
  `;
}

function renderTable(series) {
  const rows = [...series].reverse(); // 最新的在最上面,比較好看
  const html = `
    <table>
      <thead>
        <tr><th>週次</th><th>股價</th><th>分數</th><th>倍數</th><th>M/P</th></tr>
      </thead>
      <tbody>
        ${rows.map(r => `
          <tr>
            <td>${r.week}</td>
            <td>${r.price}</td>
            <td><b>${r.score}</b></td>
            <td>${r.multiplier}×</td>
            <td><span class="${r.hasMa ? 'flag-yes' : 'flag-no'}">${r.hasMa ? 'M' : '·'}</span><span class="${r.hasPfcf ? 'flag-yes' : 'flag-no'}">${r.hasPfcf ? 'P' : '·'}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
  document.getElementById('tableWrap').innerHTML = html;
}
</script>

</body>
</html>

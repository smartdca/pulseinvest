<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseInvest — Trigger Test</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Inter', sans-serif; background: #f5f5f7; color: #1d1d1f; font-size: 15px; }
.wrap { max-width: 680px; margin: 0 auto; padding: 24px 16px 80px; }
h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.sub { color: #6e6e73; font-size: 13px; margin-bottom: 20px; }
.card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.08); }
.card-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #aeaeb2; margin-bottom: 14px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
label { display: block; font-size: 12px; font-weight: 500; color: #6e6e73; margin-bottom: 5px; }
input, select { width: 100%; background: #f5f5f7; border: 1px solid rgba(0,0,0,0.12); border-radius: 10px; color: #1d1d1f; font-size: 15px; font-family: inherit; padding: 10px 12px; outline: none; }
input:focus, select:focus { border-color: #0071e3; background: #fff; }
.btn { width: 100%; padding: 15px; background: #0071e3; border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; }
.btn:disabled { opacity: 0.55; }
.log { background: #1d1d1f; color: #4cd080; font-family: monospace; font-size: 12px; padding: 14px; border-radius: 10px; height: 100px; overflow-y: auto; margin-bottom: 14px; }
.spin { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: sp .7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes sp { to { transform: rotate(360deg); } }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat-box { background: #f5f5f7; border-radius: 12px; padding: 14px; text-align: center; }
.stat-box.green { background: #e8f5ee; }
.stat-box.blue { background: #e8f0fd; }
.stat-label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #aeaeb2; margin-bottom: 6px; }
.stat-val { font-size: 26px; font-weight: 700; color: #1d1d1f; letter-spacing: -0.5px; }
.stat-box.green .stat-val { color: #1d7a45; }
.stat-box.blue .stat-val { color: #0071e3; }
.stat-sub { font-size: 11px; color: #aeaeb2; margin-top: 3px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 10px; background: #f5f5f7; color: #6e6e73; font-size: 11px; font-weight: 600; text-transform: uppercase; }
td { padding: 8px 10px; border-bottom: 1px solid rgba(0,0,0,0.06); }
.tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.tag-green { background: #e8f5ee; color: #1d7a45; }
.tag-red { background: #fef0ee; color: #b83232; }
#results { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🔍 觸發條件測試</h1>
  <p class="sub">統計過去20年，加碼條件觸發了幾次、持續多久</p>

  <div class="card">
    <div class="card-label">標的</div>
    <div class="g3">
      <div><label>標的 1</label><input type="text" id="t1" value="SPY" oninput="this.value=this.value.toUpperCase()"></div>
      <div><label>標的 2</label><input type="text" id="t2" value="QQQ" oninput="this.value=this.value.toUpperCase()"></div>
      <div><label>標的 3</label><input type="text" id="t3" value="AAPL" oninput="this.value=this.value.toUpperCase()"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">觸發條件設定（三個同時成立才觸發）</div>
    <div class="g3">
      <div><label>BIAS ≤ (距200MA%)</label><input type="number" id="bias" value="-8" step="1"></div>
      <div><label>VIX ≥</label><input type="number" id="vix" value="22" step="1"></div>
      <div><label>RSI ≤</label><input type="number" id="rsi" value="40" step="1"></div>
    </div>
  </div>

  <button class="btn" id="runBtn" onclick="runAll()">開始分析 →</button>
  <div style="height:16px"></div>
  <div class="log" id="log">等待開始...</div>

  <div id="results"></div>
</div>

<script>
const PROXY = 'https://proxy-three-mu-47.vercel.app/api/proxy';

function log(msg) {
  const el = document.getElementById('log');
  el.innerHTML += '\n' + msg;
  el.scrollTop = el.scrollHeight;
}

function avg(arr) { return arr.reduce((a,b)=>a+b,0)/arr.length; }

function calcRSI(closes, period=14) {
  if (closes.length < period + 1) return 50;
  let gains = 0, losses = 0;
  for (let i = closes.length - period; i < closes.length; i++) {
    const d = closes[i] - closes[i-1];
    if (d > 0) gains += d; else losses -= d;
  }
  const ag = gains/period, al = losses/period;
  if (al === 0) return 100;
  return 100 - (100/(1+ag/al));
}

async function fetchDaily(ticker) {
  const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=25y`;
  const url = `${PROXY}?url=${encodeURIComponent(yahooUrl)}`;
  const res = await fetch(url);
  const json = await res.json();
  if (!json.chart?.result?.[0]) throw new Error(`No data for ${ticker}`);
  const r = json.chart.result[0];
  const closes = r.indicators.quote[0].close;
  const timestamps = r.timestamp;
  const prices = [], dates = [];
  closes.forEach((c,i) => {
    if (c != null && c > 0) {
      prices.push(c);
      const d = new Date(timestamps[i]*1000);
      dates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
    }
  });
  return { prices, dates };
}

async function fetchVIX() {
  const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX?interval=1d&range=25y`;
  const url = `${PROXY}?url=${encodeURIComponent(yahooUrl)}`;
  const res = await fetch(url);
  const json = await res.json();
  if (!json.chart?.result?.[0]) throw new Error('No VIX data');
  const r = json.chart.result[0];
  const closes = r.indicators.quote[0].close;
  const timestamps = r.timestamp;
  const vixMap = {};
  closes.forEach((c,i) => {
    if (c != null && c > 0) {
      const d = new Date(timestamps[i]*1000);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      vixMap[key] = c;
    }
  });
  return vixMap;
}

function analyzeTriggers(prices, dates, vixMap, biasThresh, vixThresh, rsiThresh) {
  const triggers = [];
  let inTrigger = false;
  let triggerStart = null;
  let triggerStartIdx = null;

  for (let i = 200; i < prices.length; i++) {
    const price = prices[i];
    const date = dates[i];

    // BIAS vs 200MA
    const ma200 = avg(prices.slice(i-200, i));
    const bias = (price - ma200) / ma200 * 100;

    // RSI 14
    const rsi = calcRSI(prices.slice(Math.max(0,i-15), i+1), 14);

    // VIX
    const vix = vixMap[date] || null;
    if (vix === null) continue;

    // 三個條件同時成立
    const triggered = bias <= biasThresh && vix >= vixThresh && rsi <= rsiThresh;

    if (triggered && !inTrigger) {
      inTrigger = true;
      triggerStart = date;
      triggerStartIdx = i;
    } else if (!triggered && inTrigger) {
      inTrigger = false;
      const days = i - triggerStartIdx;
      const priceAtStart = prices[triggerStartIdx];
      const priceAtEnd = prices[i];
      const returnAfter = ((priceAtEnd - priceAtStart) / priceAtStart * 100).toFixed(1);
      triggers.push({
        start: triggerStart,
        end: date,
        days,
        biasAtStart: ((prices[triggerStartIdx] - avg(prices.slice(triggerStartIdx-200, triggerStartIdx))) / avg(prices.slice(triggerStartIdx-200, triggerStartIdx)) * 100).toFixed(1),
        vixAtStart: vixMap[triggerStart] || '—',
        rsiAtStart: calcRSI(prices.slice(Math.max(0,triggerStartIdx-15), triggerStartIdx+1), 14).toFixed(1),
        returnAfter
      });
    }
  }

  // 如果到結尾還在觸發中
  if (inTrigger) {
    const days = prices.length - triggerStartIdx;
    triggers.push({
      start: triggerStart,
      end: dates[dates.length-1] + ' (ongoing)',
      days,
      biasAtStart: '—',
      vixAtStart: vixMap[triggerStart] || '—',
      rsiAtStart: '—',
      returnAfter: '—'
    });
  }

  return triggers;
}

function renderResult(ticker, triggers) {
  if (triggers.length === 0) {
    return `<div class="card"><div class="ticker-title" style="font-size:18px;font-weight:700;margin-bottom:12px;">${ticker}</div><p style="color:#aeaeb2;font-size:14px;">條件從未觸發 — 請放寬閾值</p></div>`;
  }

  const avgDays = Math.round(triggers.reduce((s,t)=>s+t.days,0)/triggers.length);
  const validReturns = triggers.filter(t=>t.returnAfter!=='—').map(t=>parseFloat(t.returnAfter));
  const avgReturn = validReturns.length ? (validReturns.reduce((a,b)=>a+b,0)/validReturns.length).toFixed(1) : '—';

  const rows = triggers.map(t => `
    <tr>
      <td>${t.start}</td>
      <td>${t.end}</td>
      <td>${t.days} 天</td>
      <td>${t.biasAtStart}%</td>
      <td>${typeof t.vixAtStart === 'number' ? t.vixAtStart.toFixed(1) : t.vixAtStart}</td>
      <td>${t.rsiAtStart}</td>
      <td class="${parseFloat(t.returnAfter)>0?'':''}"><span class="tag ${parseFloat(t.returnAfter)>0?'tag-green':'tag-red'}">${t.returnAfter}%</span></td>
    </tr>
  `).join('');

  return `
    <div class="card">
      <div style="font-size:18px;font-weight:700;margin-bottom:14px;">${ticker}</div>
      <div class="stat-grid">
        <div class="stat-box blue">
          <div class="stat-label">觸發次數</div>
          <div class="stat-val">${triggers.length}</div>
          <div class="stat-sub">過去20年</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">平均持續</div>
          <div class="stat-val">${avgDays}</div>
          <div class="stat-sub">天</div>
        </div>
        <div class="stat-box green">
          <div class="stat-label">觸發後平均漲幅</div>
          <div class="stat-val">${avgReturn}%</div>
          <div class="stat-sub">觸發結束後至今</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">平均間隔</div>
          <div class="stat-val">${Math.round(20*12/triggers.length)}</div>
          <div class="stat-sub">個月一次</div>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <tr><th>開始</th><th>結束</th><th>持續</th><th>BIAS</th><th>VIX</th><th>RSI</th><th>後續漲幅</th></tr>
          ${rows}
        </table>
      </div>
    </div>
  `;
}

async function runAll() {
  const tickers = [
    document.getElementById('t1').value.trim(),
    document.getElementById('t2').value.trim(),
    document.getElementById('t3').value.trim()
  ].filter(Boolean);

  const biasThresh = parseFloat(document.getElementById('bias').value);
  const vixThresh = parseFloat(document.getElementById('vix').value);
  const rsiThresh = parseFloat(document.getElementById('rsi').value);

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>分析中...';
  document.getElementById('log').innerHTML = '開始...\n';
  document.getElementById('results').style.display = 'none';

  log('抓取 VIX 數據...');
  let vixMap = {};
  try {
    vixMap = await fetchVIX();
    log(`✓ VIX 數據取得 ${Object.keys(vixMap).length} 天`);
  } catch(e) {
    log(`✗ VIX 失敗：${e.message}`);
    btn.disabled = false;
    btn.innerHTML = '開始分析 →';
    return;
  }

  let html = '';
  for (const ticker of tickers) {
    try {
      log(`\n[${ticker}] 抓取數據...`);
      const { prices, dates } = await fetchDaily(ticker);
      log(`[${ticker}] ✓ ${prices.length} 天數據`);
      log(`[${ticker}] 分析觸發條件...`);
      const triggers = analyzeTriggers(prices, dates, vixMap, biasThresh, vixThresh, rsiThresh);
      log(`[${ticker}] ✓ 觸發 ${triggers.length} 次`);
      html += renderResult(ticker, triggers);
    } catch(e) {
      log(`[${ticker}] ✗ ${e.message}`);
    }
  }

  document.getElementById('results').innerHTML = html;
  document.getElementById('results').style.display = 'block';
  log('\n✅ 完成');
  btn.disabled = false;
  btn.innerHTML = '重新分析 →';
}
</script>
</body>
</html>

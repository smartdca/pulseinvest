<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseInvest — Rolling Backtest</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Inter', sans-serif; background: #f5f5f7; color: #1d1d1f; font-size: 15px; }
.wrap { max-width: 680px; margin: 0 auto; padding: 24px 16px 80px; }
h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
.sub { color: #6e6e73; font-size: 14px; margin-bottom: 24px; }
.card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.08); }
.card-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #aeaeb2; margin-bottom: 14px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
label { display: block; font-size: 12px; font-weight: 500; color: #6e6e73; margin-bottom: 5px; }
input, select {
  width: 100%; background: #f5f5f7; border: 1px solid rgba(0,0,0,0.12);
  border-radius: 10px; color: #1d1d1f; font-size: 15px; font-family: inherit;
  padding: 10px 12px; outline: none;
}
input:focus, select:focus { border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0,113,227,.1); background: #fff; }
.btn {
  width: 100%; padding: 15px; background: #0071e3; border: none;
  border-radius: 10px; color: #fff; font-size: 15px; font-weight: 600;
  font-family: inherit; cursor: pointer; margin-top: 4px;
}
.btn:disabled { opacity: 0.55; cursor: not-allowed; }
.btn:hover:not(:disabled) { background: #0077ed; }

/* Results */
#results { display: none; }
.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.stat-box { background: #f5f5f7; border-radius: 12px; padding: 14px; text-align: center; border: 1px solid rgba(0,0,0,0.08); }
.stat-box.win { background: #e8f5ee; border-color: rgba(29,122,69,0.2); }
.stat-box.lose { background: #fef0ee; border-color: rgba(184,50,50,0.2); }
.stat-label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #aeaeb2; margin-bottom: 6px; }
.stat-val { font-size: 24px; font-weight: 700; color: #1d1d1f; letter-spacing: -0.5px; }
.stat-box.win .stat-val { color: #1d7a45; }
.stat-box.lose .stat-val { color: #b83232; }
.stat-sub { font-size: 11px; color: #aeaeb2; margin-top: 3px; }

.ticker-result { margin-bottom: 20px; }
.ticker-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.3px; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 10px; background: #f5f5f7; color: #6e6e73; font-weight: 600; font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; }
td { padding: 8px 10px; border-bottom: 1px solid rgba(0,0,0,0.06); }
.g { color: #1d7a45; font-weight: 600; }
.r { color: #b83232; font-weight: 600; }

.log { background: #1d1d1f; color: #4cd080; font-family: monospace; font-size: 12px; padding: 14px; border-radius: 10px; height: 120px; overflow-y: auto; margin-bottom: 14px; }
.conclusion { background: #e8f5ee; border: 1.5px solid rgba(29,122,69,0.25); border-radius: 12px; padding: 16px; font-size: 14px; color: #1d7a45; line-height: 1.6; font-weight: 500; }
.conclusion.mixed { background: #fef8e6; border-color: rgba(138,109,0,0.25); color: #8a6d00; }
.spin { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: sp .7s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes sp { to { transform: rotate(360deg); } }

.win-bar-wrap { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
.win-bar-bg { flex: 1; height: 8px; background: #f0eee9; border-radius: 4px; overflow: hidden; }
.win-bar-fill { height: 100%; border-radius: 4px; background: #1d7a45; transition: width 1s ease; }
.win-bar-label { font-size: 12px; font-weight: 600; color: #1d7a45; width: 36px; text-align: right; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📊 Rolling Backtest</h1>
  <p class="sub">動態備用金 DCA vs 傳統固定 DCA — 所有7年起始點全部回測</p>

  <div class="card">
    <div class="card-label">設定</div>
    <div class="g3" style="margin-bottom:12px;">
      <div>
        <label>標的 1</label>
        <input type="text" id="t1" value="SPY" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div>
        <label>標的 2</label>
        <input type="text" id="t2" value="QQQ" oninput="this.value=this.value.toUpperCase()">
      </div>
      <div>
        <label>標的 3</label>
        <input type="text" id="t3" value="AAPL" oninput="this.value=this.value.toUpperCase()">
      </div>
    </div>
    <div class="g2" style="margin-bottom:12px;">
      <div>
        <label>每月預算 (USD)</label>
        <input type="number" id="budget" value="1000" min="100" step="100">
      </div>
      <div>
        <label>滾動視窗（年）</label>
        <select id="window">
          <option value="5">5 年</option>
          <option value="7" selected>7 年</option>
          <option value="8">8 年</option>
          <option value="9">9 年</option>
          <option value="10">10 年</option>
          <option value="12">12 年</option>
          <option value="15">15 年</option>
          <option value="20">20 年</option>
        </select>
      </div>
    </div>

  </div>

  <button class="btn" id="runBtn" onclick="runAll()">開始滾動回測 →</button>

  <div style="height:16px"></div>
  <div class="log" id="log">等待開始...</div>

  <div id="results">
    <div id="tickerResults"></div>
    <div class="card">
      <div class="card-label">📋 總結論</div>
      <div id="conclusion"></div>
    </div>
  </div>
</div>

<script>
const PROXY = 'https://proxy-v408.onrender.com/api/proxy';

// ── 新公式參數 ──
const THRESHOLDS = {
  broad:   { buy: 70, sell: 30 },
  megacap: { buy: 75, sell: 30 },
  growth:  { buy: 80, sell: 20 }
};

function log(msg) {
  const el = document.getElementById('log');
  el.innerHTML += '\n' + msg;
  el.scrollTop = el.scrollHeight;
}

// ── RSI 計算 ──
function calcRSI(closes, period=14) {
  if (closes.length < period + 1) return 50;
  let gains = 0, losses = 0;
  for (let i = closes.length - period; i < closes.length; i++) {
    const d = closes[i] - closes[i-1];
    if (d > 0) gains += d; else losses -= d;
  }
  const ag = gains / period, al = losses / period;
  if (al === 0) return 100;
  return 100 - (100 / (1 + ag / al));
}

// ── RSI 5年分位數 ──
function calcRSIPercentile(rsiHistory, currentRSI) {
  if (rsiHistory.length === 0) return 0.5;
  const below = rsiHistory.filter(r => r <= currentRSI).length;
  return below / rsiHistory.length;
}

// ── 新公式：動態備用金 DCA（以P_RSI為主要判斷依據）──
function dynamicDCA(monthlyPrices, budget) {
  const rsiHistory = [];
  let R_curr = 0;
  let R_total = 0;
  let totalShares = 0;
  let totalInvested = 0;

  for (let t = 0; t < monthlyPrices.length; t++) {
    const price = monthlyPrices[t];

    // 計算RSI
    const slice = monthlyPrices.slice(Math.max(0, t - 14), t + 1);
    const RSI_c = calcRSI(slice, Math.min(14, slice.length - 1));

    // 計算RSI歷史分位數（過去所有數據）
    const P_RSI = calcRSIPercentile(rsiHistory, RSI_c);
    rsiHistory.push(RSI_c);

    // 前14期數據不足，按正常投入
    if (rsiHistory.length < 15) {
      totalShares += budget / price;
      totalInvested += budget;
      continue;
    }

    // Step 1: R_剩餘
    const R_remain = R_total > 0 ? R_curr / R_total : 0;

    // Step 2: 基礎留儲比例 B_r（以P_RSI為主）
    let B_r = 0;
    if (P_RSI > 0.8) {
      B_r = 0.5;        // RSI歷史高位 → 留50%
    } else if (P_RSI > 0.65) {
      B_r = 0.25;       // RSI偏高 → 留25%
    }
    // P_RSI <= 0.65 → 不留

    // Step 3: 修正後留儲比例 F_r（備用金已夠多 → 少留）
    let F_r = B_r;
    if (R_remain > 0.5) {
      F_r = Math.max(B_r - 0.2, 0);
    }

    // Step 4: 基礎加倉比例 B_a（以P_RSI為主）
    let B_a = 0;
    if (P_RSI < 0.2) {
      B_a = 0.4;        // RSI歷史低位 → 動用40%備用金
    } else if (P_RSI < 0.35) {
      B_a = 0.2;        // RSI偏低 → 動用20%備用金
    }

    // Step 5: 修正後加倉比例 F_a（備用金不足 → 多加）
    let F_a = B_a;
    if (R_remain < 0.2 && R_curr > 0) {
      F_a = Math.min(B_a + (0.2 - R_remain), 1);
    }

    // Step 6: 最終輸出
    const AddR = budget * F_r;
    const UseR = R_curr * F_a;
    const Buy = (budget - AddR) + UseR;

    R_curr = R_curr - UseR + AddR;
    R_total += AddR;

    totalShares += Math.max(0, Buy) / price;
    totalInvested += budget;
  }
  
  const finalPrice = monthlyPrices[monthlyPrices.length - 1];
  const finalValue = totalShares * finalPrice + R_curr; // 含剩餘備用金
  const returns = (finalValue - totalInvested) / totalInvested;
  
  return { finalValue, totalInvested, returns, finalShares: totalShares, reserveLeft: R_curr };
}

// ── 傳統固定 DCA ──
function fixedDCA(monthlyPrices, budget) {
  let totalShares = 0;
  const totalInvested = budget * monthlyPrices.length;
  for (const price of monthlyPrices) {
    totalShares += budget / price;
  }
  const finalPrice = monthlyPrices[monthlyPrices.length - 1];
  const finalValue = totalShares * finalPrice;
  const returns = (finalValue - totalInvested) / totalInvested;
  return { finalValue, totalInvested, returns, finalShares: totalShares };
}

// ── 抓月收盤價 ──
async function fetchMonthlyPrices(ticker) {
  const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1mo&range=25y`;
  const url = `${PROXY}?url=${encodeURIComponent(yahooUrl)}`;
  const res = await fetch(url);
  const json = await res.json();
  if (!json.chart?.result?.[0]) throw new Error(`No data for ${ticker}`);
  const result = json.chart.result[0];
  const closes = result.indicators.quote[0].close;
  const timestamps = result.timestamp;
  const prices = [], dates = [];
  closes.forEach((c, i) => {
    if (c != null && c > 0) {
      prices.push(c);
      const d = new Date(timestamps[i] * 1000);
      dates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
    }
  });
  return { prices, dates };
}

// ── 主要滾動回測 ──
async function rollingBacktest(ticker, prices, dates, budget, windowYears) {
  const windowMonths = windowYears * 12;
  if (prices.length < windowMonths + 12) {
    throw new Error(`Not enough data for ${ticker} (need ${windowMonths + 12} months, got ${prices.length})`);
  }
  
  const results = [];
  const totalWindows = prices.length - windowMonths;
  
  log(`  ${ticker}: 共 ${totalWindows} 個 ${windowYears} 年起始點...`);
  
  for (let start = 0; start <= prices.length - windowMonths; start++) {
    const slice = prices.slice(start, start + windowMonths);
    const dynamic = dynamicDCA(slice, budget);
    const fixed = fixedDCA(slice, budget);
    const diff = dynamic.returns - fixed.returns;
    results.push({
      startDate: dates[start],
      endDate: dates[start + windowMonths - 1] || '—',
      dynamicReturn: dynamic.returns,
      fixedReturn: fixed.returns,
      diff,
      dynamicWins: diff > 0
    });
  }
  
  const winCount = results.filter(r => r.dynamicWins).length;
  const winRate = winCount / results.length;
  const avgDiff = results.reduce((s, r) => s + r.diff, 0) / results.length;
  const maxWin = Math.max(...results.map(r => r.diff));
  const maxLose = Math.min(...results.map(r => r.diff));
  const avgDynamic = results.reduce((s, r) => s + r.dynamicReturn, 0) / results.length;
  const avgFixed = results.reduce((s, r) => s + r.fixedReturn, 0) / results.length;
  
  return { ticker, results, winRate, avgDiff, maxWin, maxLose, avgDynamic, avgFixed, winCount, totalWindows: results.length };
}

function fmt(n) { return '$' + Math.round(n).toLocaleString(); }
function pct(n) { return (n >= 0 ? '+' : '') + (n * 100).toFixed(1) + '%'; }

function renderTickerResult(data) {
  const { ticker, winRate, avgDiff, maxWin, maxLose, avgDynamic, avgFixed, winCount, totalWindows } = data;
  
  // Show sample of results (every Nth row)
  const sampleEvery = Math.max(1, Math.floor(data.results.length / 20));
  const sample = data.results.filter((_, i) => i % sampleEvery === 0).slice(0, 20);
  
  const rows = sample.map(r => `
    <tr>
      <td>${r.startDate}</td>
      <td>${r.endDate}</td>
      <td class="${r.dynamicReturn > r.fixedReturn ? 'g' : 'r'}">${pct(r.dynamicReturn)}</td>
      <td>${pct(r.fixedReturn)}</td>
      <td class="${r.diff > 0 ? 'g' : 'r'}">${pct(r.diff)}</td>
    </tr>
  `).join('');
  
  return `
    <div class="card ticker-result">
      <div class="ticker-title">${ticker}</div>
      <div class="summary-grid">
        <div class="stat-box ${winRate >= 0.6 ? 'win' : 'lose'}">
          <div class="stat-label">動態 DCA 勝率</div>
          <div class="stat-val">${(winRate * 100).toFixed(0)}%</div>
          <div class="stat-sub">${winCount} / ${totalWindows} 個起始點</div>
        </div>
        <div class="stat-box ${avgDiff > 0 ? 'win' : 'lose'}">
          <div class="stat-label">平均收益差</div>
          <div class="stat-val">${pct(avgDiff)}</div>
          <div class="stat-sub">動態 vs 傳統</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">動態 DCA 平均收益</div>
          <div class="stat-val">${pct(avgDynamic)}</div>
          <div class="stat-sub">所有起始點平均</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">傳統 DCA 平均收益</div>
          <div class="stat-val">${pct(avgFixed)}</div>
          <div class="stat-sub">所有起始點平均</div>
        </div>
      </div>
      <div style="margin-bottom:10px;">
        <div style="font-size:12px;color:#6e6e73;margin-bottom:6px;">勝率</div>
        <div class="win-bar-wrap">
          <div class="win-bar-bg"><div class="win-bar-fill" style="width:${winRate*100}%"></div></div>
          <div class="win-bar-label">${(winRate*100).toFixed(0)}%</div>
        </div>
      </div>
      <div style="font-size:12px;color:#6e6e73;margin-bottom:8px;">
        最大超額收益：<span class="g">${pct(maxWin)}</span> ｜ 
        最大落後：<span class="r">${pct(maxLose)}</span>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <tr><th>起始</th><th>結束</th><th>動態收益</th><th>傳統收益</th><th>差距</th></tr>
          ${rows}
        </table>
        <div style="font-size:11px;color:#aeaeb2;margin-top:6px;">顯示 ${sample.length} / ${totalWindows} 個起始點樣本</div>
      </div>
    </div>
  `;
}

async function runAll() {
  const tickers = [
    document.getElementById('t1').value.trim(),
    document.getElementById('t2').value.trim(),
    document.getElementById('t3').value.trim()
  ].filter(Boolean);
  const budget = parseFloat(document.getElementById('budget').value) || 1000;
  const windowYears = parseInt(document.getElementById('window').value);
  
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.innerHTML = `<span class="spin"></span>回測進行中...`;
  
  document.getElementById('log').innerHTML = '開始回測...\n';
  document.getElementById('results').style.display = 'none';
  
  const allResults = [];
  
  for (const ticker of tickers) {
    try {
      log(`\n[${ticker}] 抓取歷史數據...`);
      const { prices, dates } = await fetchMonthlyPrices(ticker);
      log(`[${ticker}] ✓ 取得 ${prices.length} 個月數據（${dates[0]} 到 ${dates[dates.length-1]}）`);
      
      log(`[${ticker}] 計算所有 ${windowYears} 年起始點...`);
      const result = await rollingBacktest(ticker, prices, dates, budget, windowYears);
      allResults.push(result);
      log(`[${ticker}] ✓ 完成 — 勝率 ${(result.winRate*100).toFixed(0)}%，平均超額 ${pct(result.avgDiff)}`);
    } catch(e) {
      log(`[${ticker}] ✗ 錯誤：${e.message}`);
    }
  }
  
  if (allResults.length === 0) {
    log('\n所有標的都失敗了，請確認 proxy 是否正常運作。');
    btn.disabled = false;
    btn.innerHTML = '開始滾動回測 →';
    return;
  }
  
  // Render results
  document.getElementById('tickerResults').innerHTML = allResults.map(renderTickerResult).join('');
  
  // Overall conclusion
  const overallWinRate = allResults.reduce((s, r) => s + r.winRate, 0) / allResults.length;
  const overallAvgDiff = allResults.reduce((s, r) => s + r.avgDiff, 0) / allResults.length;
  const isWin = overallWinRate >= 0.6 && overallAvgDiff > 0;
  
  document.getElementById('conclusion').innerHTML = `
    <div class="conclusion ${isWin ? '' : 'mixed'}">
      <strong>整體結論：</strong><br><br>
      跨 ${allResults.map(r=>r.ticker).join('、')} 三個標的，所有 ${windowYears} 年起始點滾動回測：<br><br>
      • 動態備用金 DCA 平均勝率：<strong>${(overallWinRate*100).toFixed(0)}%</strong><br>
      • 平均超額收益：<strong>${pct(overallAvgDiff)}</strong>（每個 ${windowYears} 年周期）<br><br>
      ${isWin 
        ? `✅ 結論：新公式在 ${(overallWinRate*100).toFixed(0)}% 的起始點優於傳統定投，平均多賺 ${(overallAvgDiff*100).toFixed(1)} 個百分點。公式有效，可以繼續開發。`
        : `⚠️ 結論：勝率 ${(overallWinRate*100).toFixed(0)}%，需要進一步調整參數或閾值。`
      }
    </div>
  `;
  
  document.getElementById('results').style.display = 'block';
  log('\n✅ 全部完成！');
  
  btn.disabled = false;
  btn.innerHTML = '重新回測 →';
}
</script>
</body>
</html>

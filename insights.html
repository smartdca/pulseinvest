<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insights — DCAcafe</title>
<meta name="description" content="Investment strategies, market analysis, and expert interviews — curated by DCAcafe.">
<link rel="canonical" href="https://dcacafe.com/insights.html">
<link rel="icon" type="image/png" href="IMG_9104.png">
<link rel="apple-touch-icon" href="IMG_9104.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f5f0;--bg2:#eeeae2;--surface:#fff;--border:#e0dbd0;--ink:#1a1814;--ink2:#6b6560;--ink3:#aba69e;--accent:#c8813a;--al:#f5ead8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;}
nav{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.05);}
.nav-logo{display:flex;align-items:center;text-decoration:none;}
.nav-back{font-size:12px;color:var(--ink2);text-decoration:none;font-family:'DM Mono',monospace;}
.nav-back:hover{color:var(--accent);}
.wrap{max-width:520px;margin:0 auto;padding:28px 16px 100px;}
.page-hero{text-align:center;padding:20px 0 28px;}
.page-tag{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);font-weight:600;font-family:'DM Mono',monospace;margin-bottom:12px;}
.page-title{font-family:'DM Serif Display',serif;font-size:28px;line-height:1.18;letter-spacing:-.4px;margin-bottom:10px;}
.page-title em{font-style:normal;color:var(--accent);}
.page-sub{color:var(--ink2);font-size:13.5px;line-height:1.65;}
.lang-bar{display:flex;gap:8px;justify-content:center;margin-bottom:24px;}
.lang-btn{padding:5px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;font-size:12px;font-weight:500;color:var(--ink2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.lang-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.posts-list{display:flex;flex-direction:column;gap:12px;}
.post-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.06);cursor:pointer;transition:box-shadow .15s,transform .1s;text-decoration:none;display:block;}
.post-card:active{transform:scale(.98);box-shadow:none;}
.post-thumb{width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--bg2);}
.post-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.post-body{padding:16px 18px;}
.post-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.post-tag{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-family:'DM Mono',monospace;font-weight:600;background:var(--al);padding:2px 8px;border-radius:10px;}
.post-date{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;}
.post-read{font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace;margin-left:auto;}
.post-title{font-family:'DM Serif Display',serif;font-size:18px;line-height:1.25;color:var(--ink);margin-bottom:8px;}
.post-teaser{font-size:13px;color:var(--ink2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.post-cta{font-size:11px;color:var(--accent);font-family:'DM Mono',monospace;margin-top:10px;}
.empty{text-align:center;padding:40px 20px;color:var(--ink3);font-size:13px;font-family:'DM Mono',monospace;}
.footer-disc{margin-top:40px;font-size:11px;color:var(--ink3);line-height:1.6;font-family:'DM Mono',monospace;text-align:center;}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">
    <img src="IMG_9110.png" alt="DCAcafé" height="32" style="display:inline-block;vertical-align:middle;max-width:160px;object-fit:contain;" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
    <span style="display:none;font-family:'DM Serif Display',serif;font-size:20px;">DCA<span style="color:#c8813a;">cafe</span></span>
  </a>
  <a class="nav-back" href="#" onclick="history.back();return false;" id="t-back">← Back</a>
</nav>

<div class="wrap">
  <div class="page-hero">
    <div class="page-tag" id="t-tag">Insights</div>
    <h1 class="page-title" id="t-title">Ideas worth <em>investing in.</em></h1>
    <p class="page-sub" id="t-sub">Strategy, market analysis, and expert perspectives — to help you invest with conviction.</p>
  </div>

  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('en',event)">EN</button>
    <button class="lang-btn" onclick="setLang('zh',event)">中文</button>
  </div>

  <div class="posts-list" id="postsList">
    <div class="empty" id="t-loading">Loading...</div>
  </div>

  <p class="footer-disc">DCAcafe is an informational tool only and does not constitute financial or investment advice.</p>
</div>

<script>
let currentLang = localStorage.getItem('dcacafe_lang') || 'en';
let allPosts = [];

const T = {
  en: {
    tag: 'Insights',
    title: 'Ideas worth <em>investing in.</em>',
    sub: 'Strategy, market analysis, and expert perspectives — to help you invest with conviction.',
    back: '← Home',
    loading: 'Loading...',
    empty: 'No posts yet. Check back soon.',
    readmore: 'Read →'
  },
  zh: {
    tag: '投資見解',
    title: '值得<em>投入的想法。</em>',
    sub: '策略分析、市場觀點、專家訪談——幫助你有依據地投資。',
    back: '← 首頁',
    loading: '載入中...',
    empty: '尚無文章，敬請期待。',
    readmore: '閱讀 →'
  }
};

function applyLang(lang) {
  const t = T[lang];
  document.getElementById('t-tag').textContent = t.tag;
  document.getElementById('t-title').innerHTML = t.title;
  document.getElementById('t-sub').textContent = t.sub;
  document.querySelector('.nav-back').textContent = t.back;
  if(allPosts.length) renderPosts(allPosts, lang);
}

function setLang(lang, e) {
  currentLang = lang;
  localStorage.setItem('dcacafe_lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  applyLang(lang);
}

function renderPosts(posts, lang) {
  const zh = lang === 'zh';
  const list = document.getElementById('postsList');
  if(!posts.length) {
    list.innerHTML = `<div class="empty">${T[lang].empty}</div>`;
    return;
  }
  list.innerHTML = '';
  posts.forEach(post => {
    const a = document.createElement('a');
    a.className = 'post-card';
    a.href = `blog/${post.slug}.html`;
    a.innerHTML = `
      <div class="post-thumb">
        <img src="${post.hero_image}" alt="${zh ? post.title_zh : post.title_en}" loading="lazy">
      </div>
      <div class="post-body">
        <div class="post-meta">
          <span class="post-tag">${zh ? post.tag_zh : post.tag_en}</span>
          <span class="post-date">${post.date}</span>
          <span class="post-read">${post.read_time} min</span>
        </div>
        <div class="post-title">${zh ? post.title_zh : post.title_en}</div>
        <div class="post-teaser">${zh ? post.teaser_zh : post.teaser_en}</div>
        <div class="post-cta">${T[lang].readmore}</div>
      </div>`;
    list.appendChild(a);
  });
}

async function loadPosts() {
  try {
    const res = await fetch('blog/index.json?v=' + Date.now());
    if(!res.ok) throw new Error('Failed');
    allPosts = await res.json();
    renderPosts(allPosts, currentLang);
  } catch(e) {
    document.getElementById('postsList').innerHTML = `<div class="empty">${T[currentLang].empty}</div>`;
  }
}

// Init
const savedLang = localStorage.getItem('dcacafe_lang') || 'en';
if(savedLang === 'zh') {
  currentLang = 'zh';
  document.querySelectorAll('.lang-btn')[1].classList.add('active');
  document.querySelectorAll('.lang-btn')[0].classList.remove('active');
  applyLang('zh');
}
loadPosts();
</script>
</body>
</html>

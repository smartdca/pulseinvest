name: Publish Blog

on:
  # Scheduled: every Wednesday and Saturday at 09:00 Taipei time (UTC+8 = 01:00 UTC)
  schedule:
    - cron: '0 1 * * 3'   # Wednesday
    - cron: '0 1 * * 6'   # Saturday

  # Manual trigger (breaking news or immediate publish)
  workflow_dispatch:

  # Auto-trigger when posts.json is updated
  push:
    paths:
      - 'posts.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate blog pages
        run: python "generate blog.py"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/
          git diff --staged --quiet || git commit -m "chore: publish blog $(date -u +'%Y-%m-%d')"
          git push

name: Update Picks

on:
  schedule:
    # Mon 01:00 UTC = Mon 09:00 Taipei
    - cron: '0 1 * * 1'
    # Thu 01:00 UTC = Thu 09:00 Taipei
    - cron: '0 1 * * 4'
  workflow_dispatch:   # also allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pick generator
        run: python scripts/update_picks.py

      - name: Commit & push picks.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add picks.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: auto-update picks $(date -u +'%Y-%m-%d')"
          git fetch origin main
          git rebase origin/main
          git push origin main

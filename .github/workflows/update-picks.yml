name: Update Picks

on:
  schedule:
    - cron: '0 1 * * 1'   # Mon 09:00 Taipei
    - cron: '0 1 * * 4'   # Thu 09:00 Taipei
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pick generator
        run: python scripts/update_picks.py

      - name: Push picks.json via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
import base64, json, os, urllib.request

token = os.environ["GH_TOKEN"]
repo  = os.environ["REPO"]

with open("picks.json", "rb") as f:
    content = base64.b64encode(f.read()).decode()

api = f"https://api.github.com/repos/{repo}/contents/picks.json"
headers = {
    "Authorization": f"Bearer {token}",
    "Content-Type": "application/json",
    "Accept": "application/vnd.github+json",
}

# Get current SHA
req = urllib.request.Request(api, headers=headers)
with urllib.request.urlopen(req) as r:
    sha = json.loads(r.read())["sha"]

# Update file
body = json.dumps({
    "message": f"chore: auto-update picks",
    "content": content,
    "sha": sha,
}).encode()

req2 = urllib.request.Request(api, data=body, headers=headers, method="PUT")
with urllib.request.urlopen(req2) as r:
    print("Done:", json.loads(r.read())["commit"]["sha"])
PYEOF

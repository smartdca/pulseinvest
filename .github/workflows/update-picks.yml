name: Update Picks

on:
  schedule:
    - cron: '0 1 * * 2'
    - cron: '0 1 * * 5'
    - cron: '0 1 1 1,4,7,10 *'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force quarterly pool refresh (updates tickers.json)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Run picks generator
        run: |
          python scripts/update_picks.py ${{ inputs.force_refresh == true && '--refresh' || '' }}

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add picks.json || true
          git add tickers.json || true
          git diff --staged --quiet || git commit -m "chore: update picks $(date -u +'%Y-%m-%d')"
          git push

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Privacy Policy — DCAcafé</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f5f0;--bg2:#eeeae2;--surface:#fff;--border:#e0dbd0;
  --ink:#1a1814;--ink2:#6b6560;--ink3:#aba69e;
  --accent:#c8813a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;}
nav{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{text-decoration:none;color:var(--ink);display:inline-flex;align-items:center;}
.logo span{color:var(--accent);}
.lang-toggle{display:flex;background:var(--bg2);border-radius:20px;padding:3px;gap:2px;}
.lang-btn{padding:4px 14px;border-radius:16px;border:none;background:transparent;font-size:12px;font-weight:500;color:var(--ink2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.lang-btn.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.wrap{max-width:640px;margin:0 auto;padding:40px 20px 80px;}
h1{font-family:'DM Serif Display',serif;font-size:28px;letter-spacing:-.3px;margin-bottom:8px;}
.updated{font-size:12px;color:var(--ink3);font-family:'DM Mono',monospace;margin-bottom:36px;}
h2{font-size:16px;font-weight:600;margin:32px 0 10px;}
p{color:var(--ink2);line-height:1.7;margin-bottom:12px;}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}
footer{text-align:center;padding:32px 20px;border-top:1px solid var(--border);color:var(--ink3);font-size:12px;font-family:'DM Mono',monospace;}
</style>
</head>
<body>

<nav>
  <a class="logo" href="/">
    <img src="IMG_9110.png" alt="DCAcafé" height="32" style="display:inline-block;vertical-align:middle;max-width:180px;object-fit:contain;" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
    <span style="display:none;font-family:'DM Serif Display',serif;font-size:20px;letter-spacing:-.3px;">DCA<span style="color:var(--accent);">café</span></span>
  </a>
  <div class="lang-toggle">
    <button class="lang-btn" id="btnEn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btnZh" onclick="setLang('zh')">中文</button>
  </div>
</nav>

<div class="wrap" id="content"></div>

<footer id="footer-copy"></footer>

<script>
const T = {
  en: {
    title: 'Privacy Policy',
    updated: 'Last updated: June 13, 2026',
    copy: '© 2026 DCAcafé. All rights reserved.',
    sections: [
      { p: 'DCAcafé ("we", "us", or "our") operates dcacafe.com. This page explains what information we collect, how we use it, and your rights.' },
      { h: 'Information We Collect' },
      { p: 'We collect anonymous usage data through Google Analytics, including pages visited, time spent on the site, device type, and general geographic region. This data does not identify you personally.' },
      { p: 'We do not collect your name, email address, financial information, or any other personal data unless you contact us directly.' },
      { h: 'Local Storage' },
      { p: 'DCAcafé uses your browser\'s local storage to save your Watchlist and language preference. This data is stored entirely on your own device and is never transmitted to our servers.' },
      { h: 'Google Analytics' },
      { p: 'We use Google Analytics to understand how visitors use DCAcafé. Google Analytics collects anonymized data such as browser type, pages visited, and approximate location. Google\'s privacy policy is available at <a href="https://policies.google.com/privacy" target="_blank" rel="noopener">policies.google.com/privacy</a>.' },
      { h: 'Cookies' },
      { p: 'Google Analytics uses cookies to distinguish visitors. You can opt out of Google Analytics tracking by installing the <a href="https://tools.google.com/dlpage/gaoptout" target="_blank" rel="noopener">Google Analytics Opt-out Browser Add-on</a>.' },
      { h: 'Third-Party Services' },
      { p: 'DCAcafé retrieves market data from Yahoo Finance and displays company logos via third-party APIs. These services may have their own privacy practices. We do not share your personal information with any third parties.' },
      { h: 'Investment Disclaimer' },
      { p: 'DCAcafé is an informational tool only and does not constitute financial or investment advice. All investment decisions are made solely at your own risk. Past performance is not indicative of future results.' },
      { h: 'Changes to This Policy' },
      { p: 'We may update this policy from time to time. Any changes will be posted on this page with an updated date.' },
      { h: 'Contact' },
      { p: 'If you have any questions about this Privacy Policy, please contact us at <a href="mailto:help@dcacafe.com">help@dcacafe.com</a>.' },
    ]
  },
  zh: {
    title: '隱私政策',
    updated: '最後更新：2026 年 6 月 13 日',
    copy: '© 2026 DCAcafé 版權所有',
    sections: [
      { p: 'DCAcafé（以下簡稱「我們」）營運 dcacafe.com。本頁說明我們收集哪些資訊、如何使用，以及您的相關權利。' },
      { h: '收集的資訊' },
      { p: '我們透過 Google Analytics 收集匿名使用數據，包括瀏覽頁面、停留時間、裝置類型及大概地理位置。這些數據無法識別您的個人身份。' },
      { p: '除非您主動與我們聯繫，否則我們不會收集您的姓名、電子郵件、財務資訊或任何其他個人資料。' },
      { h: '本地儲存（Local Storage）' },
      { p: 'DCAcafé 使用瀏覽器的本地儲存來保存您的自選清單和語言偏好。這些資料完全儲存在您自己的裝置上，不會傳送至我們的伺服器。' },
      { h: 'Google Analytics' },
      { p: '我們使用 Google Analytics 了解訪客如何使用 DCAcafé。Google Analytics 收集瀏覽器類型、瀏覽頁面和大概位置等匿名數據。Google 的隱私政策請參閱 <a href="https://policies.google.com/privacy" target="_blank" rel="noopener">policies.google.com/privacy</a>。' },
      { h: 'Cookies' },
      { p: 'Google Analytics 使用 Cookie 來區分訪客。您可以安裝 <a href="https://tools.google.com/dlpage/gaoptout" target="_blank" rel="noopener">Google Analytics 退出瀏覽器外掛程式</a>來停止追蹤。' },
      { h: '第三方服務' },
      { p: 'DCAcafé 從 Yahoo Finance 取得市場數據，並透過第三方 API 顯示公司標誌。這些服務有各自的隱私條款。我們不會將您的個人資訊分享給任何第三方。' },
      { h: '投資免責聲明' },
      { p: 'DCAcafé 僅供參考，不構成任何投資建議。所有投資決策風險由使用者自行承擔。過去績效不代表未來結果。' },
      { h: '政策變更' },
      { p: '我們可能不定期更新本政策。任何變更將發布於本頁並更新日期。' },
      { h: '聯絡我們' },
      { p: '如有任何關於本隱私政策的問題，請來信 <a href="mailto:help@dcacafe.com">help@dcacafe.com</a>。' },
    ]
  }
};

function setLang(l) {
  localStorage.setItem('dcacafe_lang', l);
  document.getElementById('btnEn').classList.toggle('active', l === 'en');
  document.getElementById('btnZh').classList.toggle('active', l === 'zh');
  const t = T[l];
  let html = '<h1>' + t.title + '</h1><div class="updated">' + t.updated + '</div>';
  t.sections.forEach(s => {
    if (s.h) html += '<h2>' + s.h + '</h2>';
    if (s.p) html += '<p>' + s.p + '</p>';
  });
  document.getElementById('content').innerHTML = html;
  document.getElementById('footer-copy').textContent = t.copy;
}

const lang = localStorage.getItem('dcacafe_lang') || 'en';
setLang(lang);
</script>

</body>
</html>
